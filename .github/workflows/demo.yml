name: demo

# Regenerate docs/demo.gif from docs/demo.tape so the README demo can never
# drift from real engine output. Runs on demand, and automatically when the
# tape or the user-facing draft renderer changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/demo.tape
      - scripts/answer_draft.py
      - scripts/ask.py

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine deps
        run: pip install yfinance

      - name: Warm live-data cache (render must never stall on network)
        run: |
          python3 scripts/ask.py "is NBIS a buy?" >/dev/null
          python3 scripts/ask.py "compare AMD and NVDA" >/dev/null

      - name: Render demo.gif
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo.tape

      - name: Commit regenerated demo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet docs/demo.gif; then
            git add docs/demo.gif
            git commit -m "chore: regenerate demo.gif from demo.tape [skip ci]"
            git push
          else
            echo "demo.gif unchanged"
          fi
