name: Release to PyPI

# Publishes on a version tag (e.g. `v0.3.1`) using PyPI Trusted Publishing
# (OIDC) — no API token is stored anywhere. One-time setup on PyPI:
#   pypi.org → project → Settings → Publishing → add a GitHub publisher with
#   owner=notEhEnG, repo=finance-skills, workflow=release.yml, environment=pypi.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*.whl dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for trusted publishing — no password/API key
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Pinned to a full commit SHA (v1.14.0) rather than a floating tag, so a
      # compromised or re-pointed tag can't alter the publish step. Dependabot
      # (github-actions) proposes SHA bumps.
      #
      # Requires a Trusted Publisher on PyPI (project → Settings → Publishing):
      #   owner=notEhEnG, repo=finance-skills, workflow=release.yml, environment=pypi.
      # skip-existing makes a re-run (or an already-published version) a no-op
      # instead of a hard 400 "file already exists".
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          skip-existing: true
